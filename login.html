<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP FIBRA | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        body { 
            background-color: #eef4f9; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }
        
        /* Fundo Animado Clean Premium */
        .login-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #eef4f9, #e0eaf5, #dbeafe, #eef4f9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; 
            z-index: -1;
        }
        
        @keyframes gradientBG { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        
        /* Glassmorphism Claro */
        .glass-effect { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1); 
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08);
        }
        
        /* Inputs Customizados */
        .input-login {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-login:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 relative">
    
    <div class="login-bg"></div>
    
    <div class="max-w-md w-full glass-effect p-8 sm:p-10 rounded-[2.5rem] relative z-10 transition-transform duration-500 hover:scale-[1.01]">
        
        <div class="text-center mb-8 flex flex-col items-center">
            <img src="logo igp.png" alt="IGP FIBRA Logo" class="h-24 w-auto object-contain mb-3 drop-shadow-md">
            <p class="text-slate-400 text-[11px] uppercase tracking-widest font-bold">Acesso Gerencial</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Usuário</label>
                <input type="text" id="user" class="input-login w-full px-6 py-4 rounded-2xl text-slate-800 font-medium placeholder-slate-300" placeholder="Digite seu usuário">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Senha</label>
                <input type="password" id="pass" class="input-login w-full px-6 py-4 rounded-2xl text-slate-800 font-medium placeholder-slate-300" placeholder="••••••••">
            </div>
            
            <button onclick="fazerLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:shadow-blue-600/40 hover:-translate-y-0.5 active:translate-y-0 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                Entrar no Painel
                <i data-lucide="log-in" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script>
        function fazerLogin() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();

            // Suas credenciais definidas
            if(u === "igpfibra" && p === "08022008igp") {
                // Criamos um token de sessão para o navegador lembrar que você logou
                localStorage.setItem('igp_auth', 'true');
                
                // Efeito visual no botão antes de redirecionar
                const btn = document.querySelector('button');
                btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Autenticando...';
                lucide.createIcons();
                
                setTimeout(() => {
                    window.location.href = 'index.html'; // Redireciona para o principal
                }, 800);
            } else {
                // Animação de erro no botão
                const btn = document.querySelector('button');
                const originalText = btn.innerHTML;
                
                btn.classList.replace('bg-blue-600', 'bg-rose-500');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-rose-600');
                btn.classList.replace('shadow-blue-600/30', 'shadow-rose-500/30');
                btn.innerHTML = '<i data-lucide="alert-circle" class="w-5 h-5"></i> Dados Incorretos';
                lucide.createIcons();
                
                setTimeout(() => {
                    btn.classList.replace('bg-rose-500', 'bg-blue-600');
                    btn.classList.replace('hover:bg-rose-600', 'hover:bg-blue-700');
                    btn.classList.replace('shadow-rose-500/30', 'shadow-blue-600/30');
                    btn.innerHTML = originalText;
                    document.getElementById('pass').value = '';
                }, 2000);
            }
        }
        
        // Permite logar apertando "Enter"
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
