<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP FIBRA | Login</title>
    <link rel="icon" type="image/png" href="logo igp.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #eef4f9; 
            background-image: 
                radial-gradient(circle at 15% 0%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 100%, rgba(14, 165, 233, 0.08) 0%, transparent 50%);
            font-family: 'Inter', sans-serif; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.90); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1); 
            box-shadow: 0 10px 40px rgba(15, 23, 42, 0.08); 
        }

        .input-field {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            color: #1e293b;
        }
        .input-field:focus {
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .assinatura-patrick {
            font-family: 'Dancing Script', cursive;
        }
    </style>
</head>
<body class="p-4">

    <div class="glass-card w-full max-w-md rounded-3xl p-8 relative overflow-hidden flex flex-col justify-between min-h-[500px]">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 pointer-events-none"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-emerald-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20 pointer-events-none"></div>

        <div class="relative z-10 flex flex-col items-center flex-1">
            <img src="logo igp.png" alt="IGP FIBRA Logo" class="h-20 object-contain mb-6 drop-shadow-sm" onerror="this.src='https://via.placeholder.com/150x50?text=IGP+FIBRA'">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-black text-blue-600 tracking-tight">Acesso Restrito</h1>
                <p class="text-sm font-medium text-slate-500 mt-1">Dashboard Gerencial e Lançamentos</p>
            </div>

            <form id="login-form" class="w-full space-y-4">
                <div id="msg-erro" class="hidden bg-rose-50 border border-rose-200 text-rose-600 text-sm font-bold px-4 py-3 rounded-xl flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span>Usuário ou senha incorretos.</span>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Usuário</label>
                    <div class="relative mt-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="user" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="text" id="user-login" class="input-field w-full rounded-xl py-3 pl-10 pr-4 font-semibold text-sm" placeholder="Seu login" required autocomplete="off">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Senha</label>
                    <div class="relative mt-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="password" id="user-senha" class="input-field w-full rounded-xl py-3 pl-10 pr-4 font-semibold text-sm" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="btn-entrar" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-md shadow-blue-600/20 mt-4 flex items-center justify-center gap-2">
                    <span>Entrar no Sistema</span>
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <div class="relative z-10 text-center mt-8 pt-6 border-t border-slate-100">
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Desenvolvido por</span>
            <p class="assinatura-patrick text-3xl mt-1 bg-gradient-to-r from-blue-600 to-emerald-500 bg-clip-text text-transparent transform -rotate-2 hover:scale-105 transition-transform cursor-default">
                Patrick Carmo
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyDjh5UHLv-XHjVuMUeYYk9dLsQp1THEGhI",
            authDomain: "dashboard-gerencial-igpfibra.firebaseapp.com",
            projectId: "dashboard-gerencial-igpfibra",
            storageBucket: "dashboard-gerencial-igpfibra.firebasestorage.app",
            messagingSenderId: "119051294297",
            appId: "1:119051294297:web:ff8320861d3b7adcf94348"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Se já estiver logado, manda direto pro painel
        if (localStorage.getItem('igp_auth') === 'true') {
            window.location.href = 'index.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const login = document.getElementById('user-login').value.trim();
            const senha = document.getElementById('user-senha').value.trim();
            const btn = document.getElementById('btn-entrar');
            const msgErro = document.getElementById('msg-erro');

            if (!login || !senha) return;

            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Verificando...`;
            btn.disabled = true;
            msgErro.classList.add('hidden');

            try {
                // Busca no banco um usuário com o login e senha exatos
                const q = query(collection(db, "usuarios"), where("login", "==", login), where("senha", "==", senha));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const userData = querySnapshot.docs[0].data();
                    
                    localStorage.setItem('igp_auth', 'true');
                    localStorage.setItem('igp_role', userData.role);
                    localStorage.setItem('igp_nome', userData.nome);

                    window.location.href = 'index.html';
                } else {
                    msgErro.classList.remove('hidden');
                    btn.innerHTML = `<span>Entrar no Sistema</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>`;
                    btn.disabled = false;
                    lucide.createIcons();
                }
            } catch (error) {
                console.error("Erro no login:", error);
                alert("Erro ao conectar no banco de dados.");
                btn.innerHTML = `<span>Entrar no Sistema</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>`;
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
