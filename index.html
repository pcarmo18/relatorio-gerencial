<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP FIBRA Gerencial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            display: none; /* Proteção de acesso */
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .glass-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .input-field {
            background: #0f172a;
            border: 1px solid #334155;
            transition: all 0.2s;
            color: white;
        }

        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 1px #10b981;
            outline: none;
        }

        .developer-tag {
            letter-spacing: 0.15em;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        #save-indicator {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent tracking-tighter">
                    IGP FIBRA Gerencial
                </h1>
                <div class="flex flex-col mt-1">
                    <p class="text-[10px] developer-tag font-bold text-emerald-500/80 uppercase">
                        Developed by <span class="text-emerald-400 text-sm italic ml-1 font-black">Patrick Carmo</span>
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="window.fazerLogout()" class="flex items-center gap-2 bg-slate-800 hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 px-4 py-2 rounded-xl border border-slate-700 transition-all text-xs font-bold uppercase">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Sair
                </button>
                <div id="save-indicator" class="opacity-0 text-[10px] uppercase font-bold text-emerald-500 flex items-center gap-2">
                    <span>Sincronizado Cloud</span>
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl border-emerald-500/20">
                <span class="text-slate-500 text-[10px] font-bold uppercase block mb-4 tracking-widest">Faturamento Total</span>
                <span id="kpi-faturamento" class="text-3xl font-black text-slate-100 tracking-tight">R$ 0,00</span>
            </div>
            <div class="glass-card p-6 rounded-2xl border-blue-500/20">
                <span class="text-slate-500 text-[10px] font-bold uppercase block mb-4 tracking-widest text-blue-400">Ativações no Ano</span>
                <span id="kpi-ativacoes" class="text-3xl font-black text-slate-100 tracking-tight">0</span>
            </div>
            <div class="glass-card p-6 rounded-2xl border-rose-500/20">
                <span class="text-slate-500 text-[10px] font-bold uppercase block mb-4 tracking-widest text-rose-400">Cancelamentos</span>
                <span id="kpi-churn" class="text-3xl font-black text-slate-100 tracking-tight">0</span>
            </div>
            <div class="glass-card p-6 rounded-2xl border-purple-500/20">
                <span class="text-slate-500 text-[10px] font-bold uppercase block mb-4 tracking-widest text-purple-400">Cresc. Médio Fat.</span>
                <span id="kpi-crescimento" class="text-3xl font-black text-slate-100 tracking-tight">0%</span>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-card rounded-2xl overflow-hidden p-4">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-500 text-[10px] uppercase font-bold border-b border-slate-700">
                            <th class="p-4">Mês</th>
                            <th class="p-4 text-right">Faturamento (R$)</th>
                            <th class="p-4 text-right">Base Ativa</th>
                            <th class="p-4 text-right">Novos (+)</th>
                            <th class="p-4 text-right">Cancelados (-)</th>
                            <th class="p-4 text-center">Meta 1,5%</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm"></tbody>
                </table>
            </div>
            <div class="space-y-6">
                <div class="glass-card p-6 rounded-2xl h-64"><canvas id="chartEvolucao"></canvas></div>
                <div class="glass-card p-6 rounded-2xl h-64"><canvas id="chartMeta"></canvas></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // VERIFICAÇÃO DE SESSÃO
        if (localStorage.getItem('igp_auth') !== 'true') {
            window.location.href = 'login.html';
        } else {
            document.body.style.display = "block";
        }

        window.fazerLogout = () => {
            localStorage.removeItem('igp_auth');
            window.location.href = 'login.html';
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDjh5UHLv-XHjVuMUeYYk9dLsQp1THEGhI",
            authDomain: "dashboard-gerencial-igpfibra.firebaseapp.com",
            projectId: "dashboard-gerencial-igpfibra",
            storageBucket: "dashboard-gerencial-igpfibra.firebasestorage.app",
            messagingSenderId: "119051294297",
            appId: "1:119051294297:web:ff8320861d3b7adcf94348"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        let dados = meses.map(m => ({ mes: m, recebido: 0, ativos: 0, novos: 0, cancelados: 0 }));
        let currentYear = "2026";
        let chartEvolucao, chartMeta;

        async function loadData() {
            const docSnap = await getDoc(doc(db, "gestao_igp", currentYear));
            if (docSnap.exists()) {
                dados = docSnap.data().meses;
            } else {
                dados = meses.map(m => ({ mes: m, recebido: 0, ativos: 0, novos: 0, cancelados: 0 }));
            }
            renderTable();
            updateAll();
        }

        async function saveData() {
            const indicator = document.getElementById('save-indicator');
            try {
                await setDoc(doc(db, "gestao_igp", currentYear), { meses: dados });
                indicator.style.opacity = "1";
                setTimeout(() => indicator.style.opacity = "0", 1500);
            } catch (e) { console.error(e); }
        }

        window.updateData = (index, field, value) => {
            // Remove pontos de milhar antes de converter para número real
            const cleanValue = value.toString().replace(/\./g, '').replace(',', '.');
            dados[index][field] = parseFloat(cleanValue) || 0;
            updateAll();
            saveData();
        };

        function renderTable() {
            document.getElementById('table-body').innerHTML = dados.map((item, idx) => `
                <tr class="border-b border-slate-700/30">
                    <td class="p-4 font-bold text-slate-400">${item.mes}</td>
                    <td class="p-2"><input type="text" value="${item.recebido.toLocaleString('pt-BR')}" onchange="window.updateData(${idx}, 'recebido', this.value)" class="input-field w-full rounded-lg p-2 text-right font-bold text-emerald-400"></td>
                    <td class="p-2"><input type="text" value="${item.ativos.toLocaleString('pt-BR')}" onchange="window.updateData(${idx}, 'ativos', this.value)" class="input-field w-full rounded-lg p-2 text-right"></td>
                    <td class="p-2"><input type="text" value="${item.novos.toLocaleString('pt-BR')}" onchange="window.updateData(${idx}, 'novos', this.value)" class="input-field w-full rounded-lg p-2 text-right text-blue-400"></td>
                    <td class="p-2"><input type="text" value="${item.cancelados.toLocaleString('pt-BR')}" onchange="window.updateData(${idx}, 'cancelados', this.value)" class="input-field w-full rounded-lg p-2 text-right text-rose-400"></td>
                    <td class="p-4 text-center" id="status-${idx}">-</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function updateAll() {
            let tR = 0, tN = 0, tC = 0, growths = [];
            dados.forEach((d, i) => {
                tR += Number(d.recebido);
                tN += Number(d.novos);
                tC += Number(d.cancelados);
                
                if (i > 0) {
                    const antFat = dados[i-1].recebido;
                    const cell = document.getElementById(`status-${i}`);
                    if (antFat > 0 && d.recebido > 0) {
                        let perc = ((d.recebido - antFat) / antFat) * 100;
                        growths.push(perc);
                        if (cell) cell.innerHTML = `<span class="${perc >= 1.5 ? 'text-emerald-400' : 'text-rose-400'} font-black text-xs">${perc.toFixed(2)}%</span>`;
                    }
                }
            });

            // Exibição corrigida do Faturamento Total com todos os zeros (ex: 1.460.000,00)
            document.getElementById('kpi-faturamento').innerText = tR.toLocaleString('pt-BR', { 
                style: 'currency', 
                currency: 'BRL',
                minimumFractionDigits: 2 
            });
            
            document.getElementById('kpi-ativacoes').innerText = tN.toLocaleString('pt-BR');
            document.getElementById('kpi-churn').innerText = tC.toLocaleString('pt-BR');
            const avg = growths.length ? (growths.reduce((a,b) => a+b, 0) / growths.length).toFixed(2) : "0.00";
            document.getElementById('kpi-crescimento').innerText = avg + "%";
            updateCharts(growths);
        }

        function initCharts() {
            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } } };
            chartEvolucao = new Chart(document.getElementById('chartEvolucao'), { type: 'line', data: { labels: meses, datasets: [{ data: [], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 }] }, options: opt });
            chartMeta = new Chart(document.getElementById('chartMeta'), { type: 'bar', data: { labels: meses.slice(1), datasets: [{ data: [], backgroundColor: [] }] }, options: opt });
        }

        function updateCharts(growths) {
            if (!chartEvolucao) return;
            chartEvolucao.data.datasets[0].data = dados.map(d => d.recebido);
            chartEvolucao.update();
            chartMeta.data.datasets[0].data = growths;
            chartMeta.data.datasets[0].backgroundColor = growths.map(g => g >= 1.5 ? '#10b981' : '#f43f5e');
            chartMeta.update();
        }

        window.onload = () => { 
            if (localStorage.getItem('igp_auth') === 'true') { 
                initCharts(); 
                loadData(); 
            } 
        };
    </script>
</body>
</html>
