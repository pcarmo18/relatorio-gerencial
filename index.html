<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGP FIBRA Gerencial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            display: none; /* Escondido até validar o localStorage */
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .glass-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .table-container::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .input-field {
            background: #0f172a;
            border: 1px solid #334155;
            transition: all 0.2s;
            color: white;
        }

        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 1px #10b981;
            outline: none;
        }

        .select-year {
            background: #1e293b;
            border: 1px solid #334155;
            color: #10b981;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        .developer-tag {
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.15em;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        #save-indicator {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent tracking-tighter">
                    IGP FIBRA Gerencial
                </h1>
                <div class="flex flex-col mt-1">
                    <p class="text-[10px] developer-tag font-bold text-emerald-500/80 uppercase">
                        Developed by <span class="text-emerald-400 text-sm italic ml-1 font-black">Patrick Carmo</span>
                    </p>
                    <div class="flex items-center gap-2 mt-2">
                        <p class="text-slate-500 text-xs font-medium">Projeções e Acompanhamento</p>
                        <select id="year-selector" class="select-year text-xs ml-2">
                            <option value="2026" selected>2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                            <option value="2029">2029</option>
                            <option value="2030">2030</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="window.fazerLogout()" class="flex items-center gap-2 bg-slate-800 hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 px-4 py-2 rounded-xl border border-slate-700 transition-all text-xs font-bold uppercase">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Sair
                </button>

                <div id="save-indicator" class="opacity-0 text-[10px] uppercase font-bold text-emerald-500 flex items-center gap-2">
                    <span>Sincronizado</span>
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                </div>
                
                <div class="flex gap-3 bg-[#1e293b] p-1.5 rounded-2xl border border-slate-700 shadow-lg">
                    <div class="px-4 py-2 bg-emerald-500/10 text-emerald-400 rounded-xl flex items-center gap-2 text-xs font-bold uppercase tracking-wider">
                        <i data-lucide="target" class="w-4 h-4"></i>
                        Meta: 1,5% ao mês
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl border-emerald-500/20">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Faturamento Total</span>
                    <div class="p-2.5 bg-slate-800/80 rounded-xl"><i data-lucide="dollar-sign" class="text-emerald-400 w-5 h-5"></i></div>
                </div>
                <span id="kpi-faturamento" class="text-2xl font-black text-slate-100 tracking-tight">R$ 0,00</span>
            </div>

            <div class="glass-card p-6 rounded-2xl border-blue-500/20">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Ativações no Ano</span>
                    <div class="p-2.5 bg-slate-800/80 rounded-xl"><i data-lucide="plus-circle" class="text-blue-400 w-5 h-5"></i></div>
                </div>
                <span id="kpi-ativacoes" class="text-2xl font-black text-slate-100 tracking-tight">0</span>
            </div>

            <div class="glass-card p-6 rounded-2xl border-rose-500/20">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Cancelamentos</span>
                    <div class="p-2.5 bg-slate-800/80 rounded-xl"><i data-lucide="trending-down" class="text-rose-400 w-5 h-5"></i></div>
                </div>
                <span id="kpi-churn" class="text-2xl font-black text-slate-100 tracking-tight">0</span>
            </div>

            <div class="glass-card p-6 rounded-2xl border-purple-500/20">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Crescimento Médio</span>
                    <div class="p-2.5 bg-slate-800/80 rounded-xl"><i data-lucide="trending-up" class="text-purple-400 w-5 h-5"></i></div>
                </div>
                <span id="kpi-crescimento" class="text-2xl font-black text-slate-100 tracking-tight">0%</span>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-card rounded-2xl overflow-hidden">
                <div class="p-6 border-b border-slate-700 bg-slate-800/20 flex items-center gap-2">
                    <i data-lucide="file-text" class="text-slate-400 w-5 h-5"></i>
                    <h2 class="text-lg font-semibold">Tabela de Lançamentos Mensais</h2>
                </div>
                <div class="overflow-x-auto table-container">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-widest">
                                <th class="p-4 border-b border-slate-700">Mês Referência</th>
                                <th class="p-4 border-b border-slate-700 text-center">Receita (R$)</th>
                                <th class="p-4 border-b border-slate-700 text-center">Base Ativa</th>
                                <th class="p-4 border-b border-slate-700 text-center">Novos (+)</th>
                                <th class="p-4 border-b border-slate-700 text-center">Cancelados (-)</th>
                                <th class="p-4 border-b border-slate-700 text-center">Atingiu 1,5%?</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-6 rounded-2xl h-64">
                    <canvas id="chartEvolucao"></canvas>
                </div>
                <div class="glass-card p-6 rounded-2xl h-64">
                    <canvas id="chartMeta"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // VERIFICAÇÃO DE SESSÃO
        if (localStorage.getItem('igp_auth') !== 'true') {
            window.location.href = 'login.html';
        } else {
            document.body.style.display = "block";
        }

        window.fazerLogout = function() {
            localStorage.removeItem('igp_auth');
            window.location.href = 'login.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDjh5UHLv-XHjVuMUeYYk9dLsQp1THEGhI",
            authDomain: "dashboard-gerencial-igpfibra.firebaseapp.com",
            projectId: "dashboard-gerencial-igpfibra",
            storageBucket: "dashboard-gerencial-igpfibra.firebasestorage.app",
            messagingSenderId: "119051294297",
            appId: "1:119051294297:web:ff8320861d3b7adcf94348",
            measurementId: "G-R5SYK4YT23"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        let dados = meses.map(m => ({ mes: m, recebido: 0, ativos: 0, novos: 0, cancelados: 0 }));
        let currentYear = "2026";
        let chartEvolucao, chartMeta;

        async function loadData() {
            const docRef = doc(db, "gestao_igp", currentYear);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                dados = docSnap.data().meses;
            } else {
                dados = meses.map(m => ({ mes: m, recebido: 0, ativos: 0, novos: 0, cancelados: 0 }));
            }
            renderTable();
            updateAll();
        }

        async function saveData() {
            const indicator = document.getElementById('save-indicator');
            try {
                await setDoc(doc(db, "gestao_igp", currentYear), {
                    meses: dados,
                    lastUpdate: new Date()
                });
                indicator.style.opacity = "1";
                setTimeout(() => indicator.style.opacity = "0", 1500);
            } catch (e) { console.error(e); }
        }

        window.updateData = function(index, field, value) {
            dados[index][field] = parseFloat(value) || 0;
            updateAll();
            saveData();
        };

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = dados.map((item, idx) => `
                <tr class="border-b border-slate-700/30">
                    <td class="p-4 font-semibold text-slate-300">${item.mes}</td>
                    <td class="p-2"><input type="number" value="${item.recebido || ''}" oninput="window.updateData(${idx}, 'recebido', this.value)" class="input-field w-full rounded-lg px-3 py-1.5 text-right"></td>
                    <td class="p-2"><input type="number" value="${item.ativos || ''}" oninput="window.updateData(${idx}, 'ativos', this.value)" class="input-field w-full rounded-lg px-3 py-1.5 text-right font-bold text-emerald-400"></td>
                    <td class="p-2"><input type="number" value="${item.novos || ''}" oninput="window.updateData(${idx}, 'novos', this.value)" class="input-field w-full rounded-lg px-3 py-1.5 text-right text-blue-400"></td>
                    <td class="p-2"><input type="number" value="${item.cancelados || ''}" oninput="window.updateData(${idx}, 'cancelados', this.value)" class="input-field w-full rounded-lg px-3 py-1.5 text-right text-rose-400"></td>
                    <td class="p-4 text-center" id="status-${idx}">-</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function updateAll() {
            let totalR = 0, totalA = 0, totalC = 0, growths = [];
            dados.forEach((item, idx) => {
                totalR += item.recebido; totalA += item.novos; totalC += item.cancelados;
                if (idx > 0) {
                    const ant = dados[idx-1].ativos;
                    let perc = ant > 0 ? ((item.ativos - ant) / ant) * 100 : 0;
                    growths.push(perc);
                    const cell = document.getElementById(`status-${idx}`);
                    if (cell) cell.innerHTML = `<span class="${perc >= 1.5 ? 'text-emerald-400' : 'text-rose-400'} font-black text-xs">${perc.toFixed(2)}%</span>`;
                }
            });
            document.getElementById('kpi-faturamento').innerText = totalR.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('kpi-ativacoes').innerText = totalA;
            document.getElementById('kpi-churn').innerText = totalC;
            const avg = growths.length ? (growths.reduce((a,b) => a+b, 0) / growths.length).toFixed(2) : "0.00";
            document.getElementById('kpi-crescimento').innerText = avg + "%";
            updateCharts();
        }

        function initCharts() {
            const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } } };
            chartEvolucao = new Chart(document.getElementById('chartEvolucao'), { type: 'line', data: { labels: meses, datasets: [{ data: [], borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 }] }, options: opt });
            chartMeta = new Chart(document.getElementById('chartMeta'), { type: 'bar', data: { labels: meses.slice(1), datasets: [{ data: [], backgroundColor: [] }] }, options: opt });
        }

        function updateCharts() {
            if (!chartEvolucao) return;
            chartEvolucao.data.datasets[0].data = dados.map(d => d.ativos);
            chartEvolucao.update();
            const c = [], b = [];
            for(let i=1; i<dados.length; i++) {
                const p = dados[i-1].ativos > 0 ? ((dados[i].ativos - dados[i-1].ativos) / dados[i-1].ativos) * 100 : 0;
                c.push(p.toFixed(2)); b.push(p >= 1.5 ? '#10b981' : '#f43f5e');
            }
            chartMeta.data.datasets[0].data = c;
            chartMeta.data.datasets[0].backgroundColor = b;
            chartMeta.update();
        }

        function init() {
            initCharts();
            document.getElementById('year-selector').onchange = (e) => { currentYear = e.target.value; loadData(); };
            loadData();
        }

        if (localStorage.getItem('igp_auth') === 'true') init();
    </script>
</body>
</html>
